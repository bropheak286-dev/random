<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>កង់ឡូតូសំណាង</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #1a2a6c, #b21f1f, #fdbb2d);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            color: white;
            padding-bottom: 50px;
        }

        h2 { margin: 20px 0; font-size: 24px; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }

        /* --- កង់បង្វិលរាងមូល (Circle) --- */
        .wheel-container {
            position: relative;
            width: 85vw;
            max-width: 320px;
            aspect-ratio: 1 / 1;
            margin-bottom: 20px;
        }

        #wheelCanvas {
            width: 100%;
            height: 100%;
            border-radius: 50%; /* ធ្វើឱ្យមូល */
            border: 8px solid #fff;
            box-shadow: 0 0 25px rgba(0,0,0,0.6);
            transition: transform 4s cubic-bezier(0.1, 0, 0.1, 1);
            background-color: white;
        }

        /* ម្ជុលចង្អុល */
        .pointer {
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 35px;
            height: 35px;
            background: #ffffff;
            clip-path: polygon(50% 100%, 0 0, 100% 0);
            z-index: 10;
            filter: drop-shadow(0 2px 5px rgba(0,0,0,0.5));
        }

        /* --- កន្លែងបញ្ជា --- */
        .controls {
            width: 90%;
            max-width: 350px;
            background: rgba(255, 255, 255, 0.15);
            padding: 20px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-sizing: border-box;
            border: 1px solid rgba(255,255,255,0.2);
        }

        textarea {
            width: 100%;
            height: 80px;
            border-radius: 10px;
            border: none;
            padding: 12px;
            font-size: 16px;
            margin-bottom: 15px;
            box-sizing: border-box;
            background: rgba(255,255,255,0.9);
        }

        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 10px;
            transition: 0.3s;
        }

        #spinBtn { background: #2ed573; color: white; box-shadow: 0 4px 15px rgba(46, 213, 115, 0.4); }
        #updateBtn { background: #57606f; color: white; font-size: 14px; }
        button:active { transform: scale(0.95); }

        /* --- Popup អ្នកឈ្នះ --- */
        #winner-popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background: white;
            color: #333;
            padding: 40px 20px;
            border-radius: 25px;
            box-shadow: 0 0 100px rgba(0,0,0,0.8);
            z-index: 100;
            text-align: center;
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            width: 80%;
            max-width: 300px;
        }

        #winner-popup.show { transform: translate(-50%, -50%) scale(1); }
        #winner-name { font-size: 35px; color: #ff4757; display: block; margin: 15px 0; font-weight: bold; }
        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            z-index: 90;
        }
    </style>
</head>
<body>

    <h2>🎡 កង់បង្វិលផ្សងសំណាង</h2>

    <div class="wheel-container">
        <div class="pointer"></div>
        <canvas id="wheelCanvas" width="500" height="500"></canvas>
    </div>

    <div class="controls">
        <textarea id="nameInput">សង្សារចាស់&#10;សង្សារ&#10;មិត្តភក្តិ&#10;គ្រួសារ</textarea>
        <button id="updateBtn" onclick="drawWheel()">Update ឈ្មោះ</button>
        <button id="spinBtn">បង្វិល!</button>
    </div>

    <div id="winner-overlay" class="overlay" onclick="closePopup()"></div>
    <div id="winner-popup">
        <span style="font-size: 20px;">🎊 អបអរសាទរ! 🎊</span>
        <strong id="winner-name"></strong>
        <button onclick="closePopup()" style="background: #333; color: white; width: auto; padding: 10px 30px;">បិទ</button>
    </div>

    <script>
        const canvas = document.getElementById('wheelCanvas');
        const ctx = canvas.getContext('2d');
        const nameInput = document.getElementById('nameInput');
        const popup = document.getElementById('winner-popup');
        const overlay = document.getElementById('winner-overlay');
        const winnerNameText = document.getElementById('winner-name');

        let names = [];
        let currentRotation = 0;

        function drawWheel() {
            names = nameInput.value.split('\n').filter(n => n.trim() !== "");
            if (names.length === 0) return;
            
            const arcSize = (2 * Math.PI) / names.length;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            names.forEach((name, i) => {
                const angle = i * arcSize;
                
                // គូរផ្នែកកង់
                ctx.beginPath();
                ctx.fillStyle = `hsl(${i * (360 / names.length)}, 75%, 55%)`;
                ctx.moveTo(250, 250);
                ctx.arc(250, 250, 250, angle, angle + arcSize);
                ctx.fill();
                
                // គូរខ្សែបន្ទាត់ខណ្ឌ
                ctx.strokeStyle = "rgba(255,255,255,0.5)";
                ctx.lineWidth = 2;
                ctx.stroke();

                // ដាក់អក្សរឈ្មោះ
                ctx.save();
                ctx.translate(250, 250);
                ctx.rotate(angle + arcSize / 2);
                ctx.textAlign = "right";
                ctx.fillStyle = "white";
                ctx.font = "bold 28px Arial";
                ctx.fillText(name, 230, 10);
                ctx.restore();
            });
        }

        document.getElementById('spinBtn').addEventListener('click', () => {
            const spinAmount = Math.floor(Math.random() * 360) + (360 * 10); // វិល ១០ ជុំ
            currentRotation += spinAmount;
            
            canvas.style.transform = `rotate(${currentRotation}deg)`;

            setTimeout(() => {
                const actualDeg = currentRotation % 360;
                const arcSize = 360 / names.length;
                // គណនាអ្នកឈ្នះ (ម្ជុលនៅខាងលើគឺ 270 deg)
                const winnerIndex = Math.floor((360 - (actualDeg % 360)) / arcSize) % names.length;
                
                winnerNameText.innerText = names[winnerIndex];
                popup.classList.add('show');
                overlay.style.display = 'block';
            }, 4000);
        });

        function closePopup() {
            popup.classList.remove('show');
            overlay.style.display = 'none';
        }

        drawWheel();
    </script>
</body>
</html>
