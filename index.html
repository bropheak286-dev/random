<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>កង់បង្វិលផ្សងសំណាង - responsive</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            color: white;
            overflow-x: hidden;
        }

        h2 { margin: 20px 0; font-size: 24px; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }

        /* --- កង់បង្វិល (មូលឥតខ្ចោះលើទូរសព្ទ) --- */
        .wheel-container {
            position: relative;
            width: 90vw; /* ឱ្យធំសមនឹងអេក្រង់ទូរសព្ទ */
            max-width: 380px; /* កំណត់ទំហំធំបំផុត */
            aspect-ratio: 1 / 1; /* ធានាថាទទឹង និងកម្ពស់ស្មើគ្នា (មូល) */
            margin-bottom: 30px;
        }

        #wheelCanvas {
            width: 100%;
            height: 100%;
            border-radius: 50%; /* ធ្វើឱ្យមូលឥតខ្ចោះ */
            border: 8px solid #fff; /* បន្ថែមស៊ុមស */
            box-shadow: 0 0 30px rgba(0,0,0,0.4);
            transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1);
        }

        /* ម្ជុលចង្អុលនៅខាងលើ (ពណ៌ក្រហម) */
        .pointer {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 40px;
            background: #ff4757;
            clip-path: polygon(50% 100%, 0 0, 100% 0); /* រាងត្រីកោណចង្អុលចុះ */
            z-index: 10;
            border: 3px solid white;
            filter: drop-shadow(0 2px 5px rgba(0,0,0,0.5));
        }

        /* --- ផ្នែកបញ្ចូលឈ្មោះ និងប៊ូតុង --- */
        .controls {
            width: 90%;
            max-width: 380px;
            background: rgba(255, 255, 255, 0.2);
            padding: 20px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-sizing: border-box;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        textarea {
            width: 100%;
            height: 120px;
            border-radius: 12px;
            border: none;
            padding: 12px;
            font-size: 16px;
            margin-bottom: 15px;
            box-sizing: border-box;
            background: rgba(255, 255, 255, 0.8);
            color: #333;
        }

        button {
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 15px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        #spinBtn { background-color: #2ed573; color: white; }
        #updateBtn { background-color: #f1f2f6; color: #333; font-size: 14px; padding: 10px; margin-bottom: 10px; }
        button:active { transform: scale(0.95); }

        /* --- ចលនាលោតឈ្មោះអ្នកឈ្នះ (Winner Pop-up) --- */
        #winner-popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0); /* លាក់ទុក */
            background: white;
            color: #333;
            padding: 40px;
            border-radius: 25px;
            box-shadow: 0 0 50px rgba(0,0,0,0.6);
            z-index: 100;
            text-align: center;
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); /* ចលនាលោត */
            width: 80%;
            max-width: 320px;
        }

        #winner-popup.show { transform: translate(-50%, -50%) scale(1); } /* បង្ហាញ Popup */
        #winner-name { font-size: 35px; color: #ff4757; display: block; margin-top: 15px; font-weight: bold; }
        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); /* ធ្វើឱ្យអេក្រង់ងងឹត */
            display: none;
            z-index: 90;
        }
    </style>
</head>
<body>

    <h2>🎡 កង់បង្វិលផ្សងសំណាង</h2>

    <div class="wheel-container">
        <div class="pointer"></div>
        <canvas id="wheelCanvas" width="500" height="500"></canvas>
    </div>

    <div class="controls">
        <textarea id="nameInput">សង្សារចាស់&#10;សុខ&#10;សៅ&#10;ដារ៉ា&#10;លីដា</textarea>
        <button id="updateBtn" onclick="drawWheel()">Update ឈ្មោះ</button>
        <button id="spinBtn">បង្វិល!</button>
    </div>

    <div id="winner-overlay" class="overlay" onclick="closePopup()"></div>
    <div id="winner-popup">
        <span style="font-size: 20px;">🎊 អបអរសាទរ! 🎊</span>
        <strong id="winner-name"></strong>
        <button onclick="closePopup()" style="margin-top: 30px; background: #333; color: white;">បិទ</button>
    </div>

<script>
    const canvas = document.getElementById('wheelCanvas');
    const ctx = canvas.getContext('2d');
    const nameInput = document.getElementById('nameInput');
    const popup = document.getElementById('winner-popup');
    const overlay = document.getElementById('winner-overlay');
    const winnerNameText = document.getElementById('winner-name');

    let names = [];
    let currentRotation = 0;

    function drawWheel() {
        names = nameInput.value.split('\n').filter(n => n.trim() !== "");
        if (names.length === 0) return;
        
        const arcSize = (2 * Math.PI) / names.length;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        names.forEach((name, i) => {
            const angle = i * arcSize;
            
            ctx.beginPath();
            ctx.fillStyle = `hsl(${i * (360 / names.length)}, 70%, 60%)`;
            ctx.moveTo(250, 250);
            ctx.arc(250, 250, 245, angle, angle + arcSize);
            ctx.fill();
            ctx.strokeStyle = "rgba(255,255,255,0.8)";
            ctx.lineWidth = 2;
            ctx.stroke();

            ctx.save();
            ctx.translate(250, 250);
            ctx.rotate(angle + arcSize / 2);
            ctx.textAlign = "right";
            ctx.fillStyle = "white";
            ctx.font = "bold 26px Arial Khmer Battambang";
            ctx.fillText(name, 230, 10);
            ctx.restore();
        });
    }

    document.getElementById('spinBtn').addEventListener('click', () => {
        // បង្វិលយ៉ាងតិច ១០ ជុំ បូកជាមួយមុំចៃដន្យ
        const spinAmount = Math.floor(Math.random() * 360) + (360 * 10); 
        currentRotation += spinAmount;
        
        canvas.style.transform = `rotate(${currentRotation}deg)`;

        setTimeout(() => {
            // --- 💡 របៀបគណនាឱ្យចំម្ជុលក្រហមខាងលើ ---
            // ១. រកមុំដែលនៅសល់ក្នុងរង្វង់ចុងក្រោយ
            const actualDeg = currentRotation % 360;
            
            // ២. រកមុំនៃឈ្មោះនីមួយៗ
            const arcSizeDeg = 360 / names.length;
            
            // ៣. រូបមន្តថ្មី៖ (២៧០ - មុំដែលវិលបាន + ៣៦០) % ៣៦០ ដើម្បីឱ្យត្រូវនឹងម្ជុលខាងលើ
            const winnerIndex = Math.floor((270 - actualDeg + 360 * 100) / arcSizeDeg) % names.length;
            
            winnerNameText.innerText = names[winnerIndex];
            popup.classList.add('show');
            overlay.style.display = 'block';
        }, 4000);
    });

    function closePopup() {
        popup.classList.remove('show');
        overlay.style.display = 'none';
    }

    drawWheel(); // បង្ហាញកង់ពេលដំបូង
</script>
</body>
</html>
