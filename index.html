<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>កង់សំណាង - Responsive</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            color: white;
            overflow-x: hidden;
        }

        h2 { margin: 20px 0; font-size: 22px; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }

        /* --- កង់បង្វិល (Responsive) --- */
        .wheel-container {
            position: relative;
            width: 90vw; /* ឱ្យធំសមនឹងអេក្រង់ទូរសព្ទ */
            max-width: 350px;
            aspect-ratio: 1 / 1;
            margin-bottom: 30px;
        }

        #wheelCanvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 5px solid #fff;
            box-shadow: 0 0 20px rgba(0,0,0,0.4);
            transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1);
        }

        .pointer {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 30px;
            height: 30px;
            background: #ff4757;
            clip-path: polygon(50% 100%, 0 0, 100% 0);
            z-index: 10;
            border: 2px solid white;
        }

        /* --- ប្រអប់បញ្ចូលឈ្មោះ --- */
        .controls {
            width: 90%;
            max-width: 350px;
            background: rgba(255, 255, 255, 0.2);
            padding: 15px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            box-sizing: border-box;
        }

        textarea {
            width: 100%;
            height: 100px;
            border-radius: 10px;
            border: none;
            padding: 10px;
            font-size: 16px;
            margin-bottom: 10px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 10px;
            transition: 0.2s;
        }

        #spinBtn { background-color: #2ed573; color: white; }
        #updateBtn { background-color: #f1f2f6; color: #333; font-size: 14px; padding: 10px; }
        button:active { transform: scale(0.95); }

        /* --- ចលនាលោតឈ្មោះអ្នកឈ្នះ --- */
        #winner-popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background: white;
            color: #333;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            z-index: 100;
            text-align: center;
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            width: 70%;
        }

        #winner-popup.show { transform: translate(-50%, -50%) scale(1); }
        #winner-name { font-size: 30px; color: #ff4757; display: block; margin-top: 10px; }
        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            display: none;
            z-index: 90;
        }
    </style>
</head>
<body>

    <h2>🎡 កង់បង្វិលផ្សងសំណាង</h2>

    <div class="wheel-container">
        <div class="pointer"></div>
        <canvas id="wheelCanvas" width="500" height="500"></canvas>
    </div>

    <div class="controls">
        <textarea id="nameInput">មករា&#10;កុម្ភៈ&#10;មីនា&#10;មេសា</textarea>
        <button id="updateBtn" onclick="drawWheel()">ធ្វើបច្ចុប្បន្នភាពឈ្មោះ</button>
        <button id="spinBtn">បង្វិល!</button>
    </div>

    <div id="winner-overlay" class="overlay" onclick="closePopup()"></div>
    <div id="winner-popup">
        <span style="font-size: 18px;">🎉 អបអរសាទរ! 🎉</span>
        <strong id="winner-name"></strong>
        <button onclick="closePopup()" style="margin-top: 20px; background: #333; color: white;">បិទ</button>
    </div>

    <script>
        const canvas = document.getElementById('wheelCanvas');
        const ctx = canvas.getContext('2d');
        const nameInput = document.getElementById('nameInput');
        const popup = document.getElementById('winner-popup');
        const overlay = document.getElementById('winner-overlay');
        const winnerNameText = document.getElementById('winner-name');

        let names = [];
        let currentRotation = 0;

        function drawWheel() {
            names = nameInput.value.split('\n').filter(n => n.trim() !== "");
            if (names.length === 0) return;
            
            const arcSize = (2 * Math.PI) / names.length;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            names.forEach((name, i) => {
                const angle = i * arcSize;
                ctx.beginPath();
                ctx.fillStyle = `hsl(${i * (360 / names.length)}, 70%, 60%)`;
                ctx.moveTo(250, 250);
                ctx.arc(250, 250, 245, angle, angle + arcSize);
                ctx.fill();
                ctx.strokeStyle = "white";
                ctx.lineWidth = 2;
                ctx.stroke();

                ctx.save();
                ctx.translate(250, 250);
                ctx.rotate(angle + arcSize / 2);
                ctx.textAlign = "right";
                ctx.fillStyle = "white";
                ctx.font = "bold 24px Arial";
                ctx.fillText(name, 230, 10);
                ctx.restore();
            });
        }

        document.getElementById('spinBtn').addEventListener('click', () => {
            const randomSpin = Math.floor(Math.random() * 360) + (360 * 8); 
            currentRotation += randomSpin;
            
            canvas.style.transform = `rotate(${currentRotation}deg)`;

            setTimeout(() => {
                const actualDeg = currentRotation % 360;
                const arcSize = 360 / names.length;
                const winnerIndex = Math.floor((360 - (actualDeg % 360)) / arcSize) % names.length;
                
                // បង្ហាញ Popup
                winnerNameText.innerText = names[winnerIndex];
                popup.classList.add('show');
                overlay.style.display = 'block';
            }, 4000);
        });

        function closePopup() {
            popup.classList.remove('show');
            overlay.style.display = 'none';
        }

        drawWheel(); // បង្ហាញកង់ពេលដំបូង
    </script>
</body>
</html>
